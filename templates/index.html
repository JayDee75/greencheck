<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/static/style.css" />
  <title>Durably GreenCheck</title>
</head>
<body>
  <main class="container">
    <div class="brand">
      <img src="/static/durably-logo-kleur-RGB.svg" class="logo">
      <span class="badge">GreenCheck Beta</span>
    </div>

    <div class="card">
      <h1>EmpCo website scan</h1>
      <form method="post" action="/scan">
        <label>Website URL</label>
        <input name="url" placeholder="https://voorbeeld.be" required>
        <button type="submit">Start scan</button>
      </form>
    </div>
  </main>
</body>
</html>
